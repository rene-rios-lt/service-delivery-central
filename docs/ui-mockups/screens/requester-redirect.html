<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Requester — Rep Redirected</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  html, body { height: 100%; }
  .req { height: 100vh; display: flex; flex-direction: column; }
  .req__notif { padding: 12px 16px; }
  .notif {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--sd-primary-soft); border: 1px solid rgba(91,74,226,.28);
    color: #3F32A8; border-radius: 12px; padding: 13px 15px; font-size: 13.5px; box-shadow: var(--sd-elev-1);
  }
  .notif__icon { font-size: 18px; }
  .notif b { color: #2C2380; }
  .req__map { flex: 1; position: relative; }
  .track-top { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 3; }
  .track-status { background: rgba(255,255,255,.96); border: 1px solid var(--sd-border); border-radius: 999px; padding: 8px 16px; font-weight: 700; font-size: 13.5px; box-shadow: var(--sd-elev-1); display: inline-flex; align-items: center; gap: 8px; }
  .track-card { max-width: 560px; margin: 0 auto; width: 100%; }
  .track-rep { display: flex; align-items: center; gap: 13px; }
  .track-rep__ava { width: 48px; height: 48px; border-radius: 50%; background: var(--sd-primary-soft); display: grid; place-items: center; font-size: 20px; }
  .track-rep__name { font-weight: 700; font-size: 17px; }
  .track-rep__sub { font-size: 13px; color: var(--sd-text-2); margin-top: 1px; }
  .track-rep__tag { font-size: 11px; font-weight: 700; color: var(--sd-primary); background: var(--sd-primary-soft); border-radius: 6px; padding: 2px 7px; margin-left: 6px; }
</style>
</head>
<body>
<div class="req">
  <div class="sd-appbar">
    <div class="sd-appbar__logo">📍</div>
    <div>
      <div class="sd-appbar__title">A new technician is on the way</div>
      <div class="sd-appbar__sub">Transmission Control Fault</div>
    </div>
    <div class="sd-appbar__spacer"></div>
    <div class="sd-avatar">MW</div>
  </div>

  <div class="req__notif">
    <div class="notif">
      <span class="notif__icon">🔄</span>
      <span>Our apologies, we needed to redirect <b>Jordan Tran</b>. <b>Alex Rivera</b> is heading your way now.</span>
    </div>
  </div>

  <div class="req__map">
    <div class="sd-map">
      <div class="sd-map__roads">
        <i style="left:0; top:58%; width:100%; height:7px;"></i>
        <i style="left:50%; top:0; width:6px; height:100%;"></i>
        <i style="left:8%; top:22%; width:64%; height:4px; transform:rotate(15deg);"></i>
      </div>
      <!-- new rep (moving) -->
      <svg class="sd-routeline"><line x1="26%" y1="70%" x2="64%" y2="36%"></line></svg>
      <div class="sd-marker sd-marker--enroute" style="left:26%; top:70%; transform:translate(-50%,-50%);"><div class="sd-marker__pin"></div></div>
      <!-- my location (fixed) -->
      <div class="sd-pin-dest" style="left:64%; top:36%;"></div>
    </div>

    <div class="track-top">
      <span class="track-status"><span style="background:var(--sd-state-enroute); width:9px; height:9px; border-radius:50%; display:inline-block;"></span>On the way</span>
    </div>
  </div>

  <div class="sd-sheet">
    <div class="sd-sheet__grip"></div>
    <div class="track-card">
      <div style="display:flex; align-items:center;">
        <div class="track-rep">
          <div class="track-rep__ava">👷</div>
          <div>
            <div class="track-rep__name">Alex Rivera <span class="track-rep__tag">NEW</span></div>
            <div class="track-rep__sub">Vehicle IA-3382 · Service Rep</div>
          </div>
        </div>
        <div style="flex:1;"></div>
        <div class="sd-eta"><span class="sd-eta__num">14 min</span><span class="sd-eta__lbl">ETA · 12.6 mi</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
