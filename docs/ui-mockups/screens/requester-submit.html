<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Requester — Submit a Request</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  html, body { height: 100%; }
  .req { min-height: 100vh; display: flex; flex-direction: column; }
  .req__stage { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 22px 16px; }
  .req__col { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 16px; }
  .req__map { height: 230px; border-radius: var(--sd-radius); overflow: hidden; box-shadow: var(--sd-elev-2); border: 1px solid var(--sd-border); position: relative; }
  .req__maphint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,.95); border: 1px solid var(--sd-border); border-radius: 999px; padding: 7px 14px; font-size: 12.5px; font-weight: 600; box-shadow: var(--sd-elev-1); }
  .req__h { font-size: 21px; font-weight: 750; margin: 0; }
  .req__sub { color: var(--sd-text-2); font-size: 14px; margin: 4px 0 0; }
</style>
</head>
<body>
<div class="req">
  <div class="sd-appbar">
    <div class="sd-statusbar">
      <span>9:41</span>
      <div class="sd-statusbar__island"></div>
      <span class="sd-statusbar__right">100% ▮</span>
    </div>
    <div class="sd-appbar__logo">📍</div>
    <div>
      <div class="sd-appbar__title">Request Service</div>
      <div class="sd-appbar__sub">Report an equipment fault</div>
    </div>
    <div class="sd-appbar__spacer"></div>
    <div class="sd-avatar">MW</div>
  </div>

  <div class="req__stage">
    <div class="req__col">
      <div>
        <h1 class="req__h">Where are you?</h1>
        <p class="req__sub">Drop a pin or use your device location, then tell us what's wrong.</p>
      </div>

      <div class="req__map">
        <div class="sd-map">
          <div class="sd-map__roads">
            <i style="left:0; top:50%; width:100%; height:6px;"></i>
            <i style="left:40%; top:0; width:6px; height:100%;"></i>
          </div>
          <div class="sd-pin-dest" style="left:50%; top:46%;"></div>
        </div>
        <div class="req__maphint">📍 Pin set · 1200 Grand Ave, Des Moines</div>
      </div>

      <button class="sd-btn sd-btn--outline sd-btn--block">📡 Use my current location</button>

      <div>
        <label class="sd-field__label">What's the fault?</label>
        <div class="sd-select sd-input--focus" style="display:flex; align-items:center; justify-content:space-between;">
          <span>P0700 · Transmission Control Fault</span>
          <span class="sd-muted">▾</span>
        </div>
      </div>

      <button class="sd-btn sd-btn--primary sd-btn--block sd-btn--lg">Request Service</button>
    </div>
  </div>
</div>
  <div class="sd-homebar"></div>
</body>
</html>
