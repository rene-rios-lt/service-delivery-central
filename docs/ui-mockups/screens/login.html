<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Login</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  html, body { height: 100%; }
  .login { min-height: 100vh; display: grid; place-items: center; padding: 24px;
    background: radial-gradient(1200px 600px at 50% -10%, #ECEAFB 0%, var(--sd-bg) 60%); }
  .login__card { width: 100%; max-width: 380px; background: var(--sd-surface); border: 1px solid var(--sd-border);
    border-radius: 18px; box-shadow: var(--sd-elev-3); padding: 30px 26px; }
  .login__brand { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 22px; }
  .login__logo { width: 56px; height: 56px; border-radius: 16px; background: var(--sd-primary);
    display: grid; place-items: center; font-size: 27px; box-shadow: var(--sd-elev-2); }
  .login__title { font-size: 20px; font-weight: 750; }
  .login__sub { font-size: 13px; color: var(--sd-text-2); }
  .login__foot { text-align: center; font-size: 12px; color: var(--sd-text-3); margin-top: 16px; }
</style>
</head>
<body>
<div class="login">
  <div class="login__card">
    <div class="login__brand">
      <div class="login__logo">🛰️</div>
      <div style="text-align:center;">
        <div class="login__title">Service Delivery</div>
        <div class="login__sub">Sign in to continue</div>
      </div>
    </div>

    <div class="sd-field">
      <label class="sd-field__label">Username</label>
      <div class="sd-input">marcus.webb</div>
    </div>
    <div class="sd-field">
      <label class="sd-field__label">Password</label>
      <div class="sd-input sd-input--focus">••••••••••</div>
    </div>

    <button class="sd-btn sd-btn--primary sd-btn--block sd-btn--lg" style="margin-top:4px;">Sign in</button>

    <div class="login__foot">You'll be routed to your view automatically by role.</div>
  </div>
</div>
</body>
</html>
