<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Requester — Live Tracking</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  html, body { height: 100%; }
  .req { height: 100vh; display: flex; flex-direction: column; }
  .req__map { flex: 1; position: relative; }
  .track-top { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; gap: 10px; align-items: center; }
  .track-status { background: rgba(255,255,255,.96); border: 1px solid var(--sd-border); border-radius: 999px; padding: 8px 16px; font-weight: 700; font-size: 13.5px; box-shadow: var(--sd-elev-1); display: inline-flex; align-items: center; gap: 8px; }
  .track-card { max-width: 560px; margin: 0 auto; width: 100%; }
  .track-rep { display: flex; align-items: center; gap: 13px; }
  .track-rep__ava { width: 48px; height: 48px; border-radius: 50%; background: var(--sd-primary-soft); display: grid; place-items: center; font-size: 20px; }
  .track-rep__name { font-weight: 700; font-size: 17px; }
  .track-rep__sub { font-size: 13px; color: var(--sd-text-2); margin-top: 1px; }
</style>
</head>
<body>
<div class="req">
  <div class="sd-appbar">
    <div class="sd-statusbar">
      <span>9:41</span>
      <div class="sd-statusbar__island"></div>
      <span class="sd-statusbar__right">100% ▮</span>
    </div>
    <div class="sd-appbar__logo">📍</div>
    <div>
      <div class="sd-appbar__title">Your technician is on the way</div>
      <div class="sd-appbar__sub">Transmission Control Fault</div>
    </div>
    <div class="sd-appbar__spacer"></div>
    <div class="sd-avatar">MW</div>
  </div>

  <div class="req__map">
    <div class="sd-map">
      <div class="sd-map__roads">
        <i style="left:0; top:58%; width:100%; height:7px;"></i>
        <i style="left:55%; top:0; width:6px; height:100%;"></i>
        <i style="left:5%; top:25%; width:70%; height:4px; transform:rotate(18deg);"></i>
      </div>
      <!-- straight-line route: rep marker centre (30,66) → requester pin (66,34);
           both endpoints sit at a centre-anchored marker so the line tucks under each -->
      <svg class="sd-routeline"><line x1="30%" y1="66%" x2="66%" y2="34%"></line></svg>
      <!-- rep (moving) — centre-anchored so the route connects under the pin -->
      <div class="sd-marker sd-marker--enroute" style="left:30%; top:66%; transform:translate(-50%,-50%);"><div class="sd-marker__pin"></div></div>
      <!-- my location (fixed) -->
      <div class="sd-pin-dest" style="left:66%; top:34%;"></div>
    </div>

    <div class="track-top">
      <span class="track-status"><span class="sd-chip__dot" style="background:var(--sd-state-enroute); width:9px; height:9px; border-radius:50%; display:inline-block;"></span>On the way</span>
    </div>
  </div>

  <div class="sd-sheet">
    <div class="sd-sheet__grip"></div>
    <div class="track-card">
      <div style="display:flex; align-items:center;">
        <div class="track-rep">
          <div class="track-rep__ava">👷</div>
          <div>
            <div class="track-rep__name">Jordan Tran</div>
            <div class="track-rep__sub">Vehicle IA-4471 · Service Rep</div>
          </div>
        </div>
        <div style="flex:1;"></div>
        <div class="sd-eta"><span class="sd-eta__num">9 min</span><span class="sd-eta__lbl">ETA · 8.1 mi</span></div>
      </div>
    </div>
  </div>
</div>
  <div class="sd-homebar"></div>
</body>
</html>
