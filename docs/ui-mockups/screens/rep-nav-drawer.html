<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Service Rep — Navigation Menu</title>
<link rel="stylesheet" href="../design-system.css">
<style>
  html, body { height: 100%; }
  .phone { height: 100vh; display: flex; flex-direction: column; position: relative; background: var(--sd-bg);
    --sd-safe-bottom: 34px; }
  .stage { flex: 1; position: relative; }
  /* Left-anchored drawer — pairs with the leading hamburger and matches the app's
     Anchor.Start MudDrawer. Slides in from the left; the scrim dims the rest. */
  .drawer-scrim { position: absolute; inset: 0; background: rgba(20,22,40,.42); z-index: 10; }
  .drawer { position: absolute; top: 0; left: 0; height: 100%; width: 296px; background: var(--sd-surface);
    box-shadow: 8px 0 28px rgba(20,22,40,.22); z-index: 11; display: flex; flex-direction: column; }
  .drawer__items { padding: 14px 8px 10px; display: flex; flex-direction: column; gap: 2px; }
  .drawer__item { display: flex; align-items: center; gap: 13px; padding: 13px 14px; border-radius: 10px; font-size: 14.5px; font-weight: 600; color: var(--sd-text); }
  .drawer__item .ic { width: 22px; text-align: center; font-size: 17px; }
  .drawer__item--active { background: var(--sd-primary-soft); color: var(--sd-primary); }
  .drawer__item--danger { color: var(--sd-state-onsite); }
  .drawer__spacer { flex: 1; }
  .drawer__div { height: 1px; background: var(--sd-border); margin: 8px 14px; }
  /* Footer note clears the bottom home indicator so it is never clipped (the old
     right-anchored drawer let it run under the home-indicator zone). */
  .drawer__note { padding: 14px 18px calc(14px + var(--sd-safe-bottom)); font-size: 11.5px; color: var(--sd-text-3); }
</style>
</head>
<body>
<div class="phone">
  <div class="sd-appbar">
    <div class="sd-statusbar">
      <span>9:41</span>
      <div class="sd-statusbar__island"></div>
      <span class="sd-statusbar__right">100% ▮</span>
    </div>
    <button class="sd-appbar__menu" aria-label="Close menu">✕</button>
    <div class="sd-appbar__logo">🚐</div>
    <div>
      <div class="sd-appbar__title">Service Delivery</div>
      <div class="sd-appbar__sub">Vehicle IA-4471 · Available</div>
    </div>
    <div class="sd-appbar__spacer"></div>
    <div class="sd-avatar">RA</div>
  </div>

  <div class="stage">
    <div class="drawer-scrim"></div>
    <div class="drawer">
      <div class="drawer__items">
        <div class="drawer__item drawer__item--active"><span class="ic">🏠</span>Waiting for offers</div>
        <div class="drawer__item"><span class="ic">📋</span>Job history</div>
        <div class="drawer__item"><span class="ic">❓</span>Help &amp; support</div>
        <div class="drawer__div"></div>
        <div class="drawer__item drawer__item--danger"><span class="ic">🅿️</span>Release vehicle</div>
        <div class="drawer__item drawer__item--danger"><span class="ic">⏻</span>Log out</div>
      </div>
      <div class="drawer__spacer"></div>
      <div class="drawer__note">Releasing returns IA-4471 to the fleet. Disabled while a job is in progress.</div>
    </div>
  </div>

  <div class="sd-homebar"></div>
</div>
</body>
</html>
